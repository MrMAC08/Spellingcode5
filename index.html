        }

        if (currentStep === 0) {
            card.innerHTML = `<h2>Vocabulary Station</h2><p style="font-size: 1.2rem;">Enter your name to start:</p><input type="text" id="nameInput" class="student-input" placeholder="Your Name..."><br><button onclick="submitName()">Enter Station</button>`;
            document.getElementById('nameInput').focus();
        } else if (currentStep === 0.5) {
            let buttons = "";
            Object.keys(MASTER_SPELLING_CURRICULUM).forEach((ruleName) => {
                buttons += `<button class="menu-btn" onclick="launchRule('${encodeURIComponent(ruleName)}')"><span style="display:block; margin-bottom: 8px;">${ruleName}</span><span style="font-size:0.85rem; font-weight:normal; color:#64748b;">(${MASTER_SPELLING_CURRICULUM[ruleName].length} words)</span></button>`;
            });
            card.innerHTML = `<h2>Welcome, ${studentName}!</h2><p style="font-size: 1.2rem; margin-bottom:10px;">Select your spelling list part:</p><div class="menu-grid">${buttons}</div>`;
        } else {
            const currentData = activeLessonWords[currentWordIndex];
            let progressHTML = `<div class="progress-bar">${activeLessonLabel} &bull; Word ${currentWordIndex + 1} of ${activeLessonWords.length}</div>`;
            let ruleExplanation = MASTER_SPELLING_RULES[currentData.rule] || `💡 <strong>Pattern Rule:</strong> Focus on spelling words in the <em>${currentData.rule}</em> category carefully!`;

            if (currentStep === 1) {
                card.innerHTML = `${progressHTML}<div class="target-word">${currentData.word}</div><div class="rule-box">${ruleExplanation}</div><button onclick="nextStep()">I Studied It</button>`;
            } else if (currentStep === 2) {
                // Word 1 passes completely automatically. Words 2-7 check previous word submission string.
                if (currentWordIndex === 0) {
                    currentStep = 3; 
                    renderStep();
                    return;
                }
                let targetPassword = getRequiredPassword();
                card.innerHTML = `${progressHTML}<div style="font-size: 1.4rem; font-weight: bold; color: var(--danger);">Notebook Practice</div><ol style="text-align: left; margin: 20px auto; max-width: 85%; font-size: 1.2rem; line-height: 1.6;"><li>Look closely at the word: <strong>${currentData.word}</strong></li><li>Write it down on paper 5 times.</li></ol><div class="lock-container"><label style="font-weight: bold; display:block; margin-bottom:5px;">Password Lock</label><span style="font-size:0.9rem; color:#64748b; display:block; margin-bottom:10px;">Type the previous word you just spelled to unlock your notebook work!</span><input type="text" id="passInput" class="password-input" placeholder="Previous word..." autocomplete="off"><br><button onclick="verifyWordLock()" style="margin-top:10px; padding: 8px 20px; background-color: var(--danger);">Unlock</button><div id="lockFeedback" class="feedback"></div></div>`;
                document.getElementById('passInput').focus();
            } else if (currentStep === 3) {
                card.innerHTML = `${progressHTML}<p style="font-size:1.3rem;">Study before it disappears...</p><div class="target-word" id="fadingWord">${currentData.word}</div>`;
                setTimeout(() => { 
                    const el = document.getElementById('fadingWord');
                    if(el) el.classList.add('hidden-word'); 
                    setTimeout(() => { nextStep(); }, 600); 
                }, 1800);
            } else if (currentStep === 4) {
                card.innerHTML = `${progressHTML}<div class="sentence-prompt">${currentData.sentence}</div><input type="text" id="testInput" class="student-input" placeholder="Spell the missing word" autocomplete="off"><br><button onclick="checkTestAnswer()">Verify Spelling</button><div id="testFeedback" class="feedback"></div>`;
                document.getElementById('testInput').focus();
            }
        }
    }

    function submitName() { 
        const val = document.getElementById('nameInput').value.trim(); 
        if(val) { studentName = val; currentStep = 0.5; renderStep(); } 
    }
    
    function launchRule(encoded) { 
        activeLessonWords = MASTER_SPELLING_CURRICULUM[decodeURIComponent(encoded)]; 
        activeLessonLabel = decodeURIComponent(encoded); 
        currentWordIndex = 0; 
        correctWordsList = []; 
        incorrectWordsList = []; 
        correctCount = 0; 
        currentStep = 1; 
        renderStep(); 
    }
    
    function nextStep() { 
        currentStep++; 
        renderStep(); 
    }
    
    function verifyWordLock() { 
        const entered = document.getElementById('passInput').value.trim().toLowerCase();
        if(entered === getRequiredPassword()) { 
            nextStep(); 
        } else { 
            const fb = document.getElementById('lockFeedback'); 
            fb.className = "feedback error"; 
            fb.innerHTML = "Incorrect word lock. Think back to the word you just spelled!"; 
        } 
    }
    
    function checkTestAnswer() {
        const entered = document.getElementById('testInput').value.trim().toLowerCase();
        const correct = activeLessonWords[currentWordIndex].word;
        
        if(entered === correct) { 
            correctCount++; 
            correctWordsList.push(correct); 
        } else { 
            incorrectWordsList.push(`${entered || '[Blank]'} (${correct})`); 
        }
        
        const fb = document.getElementById('testFeedback');
        fb.className = entered === correct ? "feedback success" : "feedback error";
        fb.innerHTML = entered === correct ? "Correct!" : `Incorrect. Correct spelling is "${correct}".`;
        
        setTimeout(() => { 
            if (currentWordIndex < activeLessonWords.length - 1) { 
                currentWordIndex++; 
                currentStep = 1; 
                renderStep(); 
            } else { 
                showEndScreen(); 
            } 
        }, 2200);
    }

    function showEndScreen() {
        document.getElementById('navigationZone').innerHTML = "";
        let finalScore = `${correctCount} out of ${activeLessonWords.length}`;
        document.getElementById('gameCard').innerHTML = `<h1 style="color: var(--success);">Practice Complete</h1><p>Great work, ${studentName}!</p><p>Your Score: <strong>${finalScore}</strong></p><div id="submissionZone"><button onclick="openGoogleFormLink()">Send Progress Form</button></div>`;
    }

    function openGoogleFormLink() {
        let finalScore = `${correctCount} out of ${activeLessonWords.length}`;
        let filledURL = `${formViewURL}?usp=pp_url&${nameKey}=${encodeURIComponent(studentName)}&${wordsKey}=${encodeURIComponent(correctWordsList.join(', ') || "None")}&${incorrectKey}=${encodeURIComponent(incorrectWordsList.join(', ') || "None")}&${scoreKey}=${encodeURIComponent(finalScore)}`;
        window.open(filledURL, '_blank');
        document.getElementById('submissionZone').innerHTML = `<p style="color: var(--success); font-weight:bold; margin-top: 15px;">Form window opened! Make sure you click submit on that page to turn it in.</p><button onclick="returnToMainMenu()" style="background:#64748b; margin-top:10px;">Back to Main Menu</button>`;
    }

    // Initialize layout immediately
    currentStep = 0;
    renderStep();
</script>
</body>
</html>
