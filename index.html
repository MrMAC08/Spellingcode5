        } else {
            const currentData = activeLessonWords[currentWordIndex];
            let progressHTML = `<div class="progress-bar">${activeLessonLabel} &bull; Word ${currentWordIndex + 1} of ${activeLessonWords.length}</div>`;
            let ruleExplanation = RULE_TEXTS[currentData.rule] || `<strong>Rule to copy:</strong> Focus on patterns in the <em>${currentData.rule}</em> category carefully!`;

            if (currentStep === 1) {
                card.innerHTML = `${progressHTML}<div class="target-word">${currentData.word}</div><div class="rule-box">${ruleExplanation}</div><button onclick="nextStep()">I Have Studied It</button>`;
            } else if (currentStep === 2) {
                card.innerHTML = `${progressHTML}<div style="font-size: 1.4rem; font-weight: bold; color: var(--primary);">Notebook Practice</div><ol><li>Copy the rule box onto your paper.</li><li>Look closely at the word: <strong>${currentData.word}</strong></li><li>Write it down into your notebook 5 times carefully.</li></ol><button onclick="nextStep()">Finished Writing</button>`;
            } else if (currentStep === 3) {
                card.innerHTML = `${progressHTML}<p style="font-size:1.3rem;">Study the word layout before it disappears...</p><div class="target-word" id="fadingWord">${currentData.word}</div>`;
                setTimeout(() => { document.getElementById('fadingWord')?.classList.add('hidden-word'); setTimeout(() => { nextStep(); }, 600); }, 1500);
            } else if (currentStep === 4) {
                card.innerHTML = `${progressHTML}<div class="sentence-prompt">${currentData.sentence}</div><input type="text" id="testInput" class="student-input" placeholder="Spell the word here" autocomplete="off" spillcheck="false"><br><button onclick="checkTestAnswer()">Verify Spelling</button><div id="testFeedback" class="feedback"></div>`;

                document.getElementById('testInput').addEventListener('keypress', function(e) { if(e.key === 'Enter') checkTestAnswer(); });
            }
        }
    }

    function submitName() { const val = document.getElementById('nameInput').value.trim(); if(val) { studentName = val; currentStep = 0.5; renderStep(); } }
    
    function launchRule(encoded) { 
        activeLessonWords = masterRulesMap[decodeURIComponent(encoded)]; 
        activeLessonLabel = decodeURIComponent(encoded); 
        currentWordIndex = 0; correctWordsList = []; incorrectWordsList = []; correctCount = 0; currentStep = 1; 
        renderStep(); 
    }
    
    function nextStep() { currentStep++; renderStep(); }
    
    function checkTestAnswer() {
        const btn = card.querySelector('button');
        if(btn && btn.disabled) return; // Prevent double trigger
        
        const entered = document.getElementById('testInput').value.trim().toLowerCase();
        const correct = activeLessonWords[currentWordIndex].word;
        
        // Disable interface elements briefly to prevent skipped words
        if(btn) btn.disabled = true;
        document.getElementById('testInput').disabled = true;

        if(entered === correct) { correctCount++; correctWordsList.push(correct); } else { incorrectWordsList.push(`${entered || '[Blank]'} (${correct})`); }
        const fb = document.getElementById('testFeedback');
        fb.className = entered === correct ? "feedback success" : "feedback error";
        fb.innerHTML = entered === correct ? "✓ Correct!" : `✗ Incorrect. The correct spelling is "${correct}".`;
        
        setTimeout(() => { 
            if (currentWordIndex < activeLessonWords.length - 1) { currentWordIndex++; currentStep = 1; renderStep(); } else { showEndScreen(); } 
        }, 2200);
    }

    function showEndScreen() {
        let finalScore = `${correctCount} out of ${activeLessonWords.length}`;
        document.getElementById('gameCard').innerHTML = `<h1 style="color: var(--success);">Practice Complete</h1><p>Great job, ${studentName}!</p><p>Your Score: <strong>${finalScore}</strong></p><div id="submissionZone"><button onclick="openGoogleFormLink()">Send Progress Form</button><br><button onclick="returnToMenu()" style="background-color:#64748b; margin-top:10px;">Choose Another List</button></div>`;
    }

    function returnToMenu() { currentStep = 0.5; renderStep(); }

    function openGoogleFormLink() {
        let finalScore = `${correctCount} out of ${activeLessonWords.length}`;
        let filledURL = `${formViewURL}?usp=pp_url&${nameKey}=${encodeURIComponent(studentName)}&${wordsKey}=${encodeURIComponent(correctWordsList.join(', ') || "None")}&${incorrectKey}=${encodeURIComponent(incorrectWordsList.join(', ') || "None")}&${scoreKey}=${encodeURIComponent(finalScore)}`;
        window.open(filledURL, '_blank');
        document.getElementById('submissionZone').innerHTML = `<p style="color: var(--success); font-weight:bold;">Form opened in a new tab! Click submit on that form window to log data.</p><button onclick="returnToMenu()" style="background-color:#64748b; margin-top:10px;">Choose Another List</button>`;
    }
