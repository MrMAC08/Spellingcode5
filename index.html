<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code 5 Vocabulary Station (Year Five)</title>
    <style>
        :root { 
            --primary: #3b82f6; 
            --success: #10b981; 
            --danger: #ef4444; 
            --bg: #f8fafc; 
            --card-bg: #ffffff; 
            --text: #0f172a; 
        }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: var(--bg); 
            color: var(--text); 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        .container { 
            width: 100%; 
            max-width: 800px; 
            position: relative;
            z-index: 1;
        }
        /* Fixed display none logic here to prevent invisible overlaps on Chromebooks */
        .teacher-panel { 
            display: none; 
            background: #f1f5f9; 
            border: 2px dashed #94a3b8; 
            border-radius: 12px; 
            padding: 20px; 
            margin-bottom: 30px; 
            position: relative;
            z-index: 10;
        }
        .teacher-panel h2 { margin-top: 0; color: #334155; }
        .bulk-textarea { 
            width: 100%; 
            height: 180px; 
            padding: 10px; 
            border: 1px solid #cbd5e1; 
            border-radius: 6px; 
            font-family: monospace; 
            font-size: 13px; 
            box-sizing: border-box; 
            margin-bottom: 15px; 
            resize: vertical; 
        }
        .student-card { 
            background: var(--card-bg); 
            border-radius: 16px; 
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); 
            padding: 40px; 
            text-align: center; 
            min-height: 400px; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            position: relative;
            z-index: 2;
        }
        .menu-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); 
            gap: 15px; 
            width: 100%; 
            max-width: 650px; 
            margin-top: 20px; 
        }
        .menu-btn { 
            background-color: #f8fafc; 
            color: var(--text); 
            border: 2px solid #e2e8f0; 
            padding: 18px; 
            font-size: 1.05rem; 
            border-radius: 10px; 
            cursor: pointer; 
            font-weight: bold; 
            text-align: left; 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between; 
            pointer-events: auto; /* Force element pointer handling */
        }
        .menu-btn:hover { 
            background-color: var(--primary); 
            color: white; 
            border-color: var(--primary); 
        }
        .progress-bar { font-weight: bold; color: var(--primary); margin-bottom: 20px; font-size: 1.1rem; }
        .target-word { font-size: 4.5rem; font-weight: 800; letter-spacing: 1px; margin: 10px 0; transition: opacity 0.5s ease; }
        .hidden-word { opacity: 0 !important; }
        .rule-box { background: #f8fafc; border-left: 5px solid var(--primary); padding: 20px; border-radius: 0 8px 8px 0; font-size: 1.15rem; margin: 20px 0; max-width: 90%; text-align: left; line-height: 1.6; }
        .rule-box strong { color: var(--primary); }
        .rule-box ul { margin: 8px 0; padding-left: 20px; }
        .lock-container { background: #fef2f2; border: 2px dashed var(--danger); border-radius: 8px; padding: 15px; margin: 0 auto; width: 90%; max-width: 400px; }
        .teacher-password-input, .student-input { font-size: 1.5rem; padding: 12px; text-align: center; border: 3px solid #cbd5e1; border-radius: 8px; outline: none; }
        .teacher-password-input { width: 240px; font-size: 1.2rem; padding: 8px; text-transform: lowercase;}
        .student-input { width: 80%; max-width: 350px; text-transform: lowercase; }
        button { background-color: var(--primary); color: white; border: none; padding: 12px 28px; font-size: 1.1rem; font-weight: bold; border-radius: 8px; cursor: pointer; margin-top: 20px; }
        button:hover { background-color: #2563eb; }
        .sentence-prompt { font-size: 1.6rem; margin-bottom: 25px; line-height: 1.6; }
        .sentence-prompt em { color: var(--primary); font-weight: bold; font-style: normal; text-decoration: underline; }
        .feedback { font-size: 1.2rem; font-weight: bold; margin-top: 15px; }
        .feedback.success { color: var(--success); }
        .feedback.error { color: var(--danger); }
        .toggle-panel-btn { background: #64748b; margin-bottom: 10px; padding: 8px 16px; font-size: 0.9rem; color: white; border: none; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>
<div class="container">
    <button class="toggle-panel-btn" onclick="secureTogglePanel()">Open Control Panel</button>
    <div class="teacher-panel" id="teacherPanel">
        <h2>Code 5 Setup Panel</h2>
        <div style="margin-bottom: 15px;">
            <label style="font-weight:bold;">First Word Unlock Passcode: </label>
            <input type="text" id="teacherCodeSetting" value="tiger" style="padding:5px; font-size:1rem; width:120px;">
        </div>
        <div style="margin-bottom: 15px;">
            <label style="font-weight:bold; display:block; margin-bottom:5px;">Paste Code 5 Word List Below:</label>
            <div style="font-size:0.85rem; color:#64748b; margin-bottom:5px;">Format: Word, Rule_Key, Sentence with __ blank</div>
            <textarea id="bulkPasteInput" class="bulk-textarea" placeholder="eight, eigh_vowel_team, There are exactly __ planets in our solar system."></textarea>
            <button onclick="processBulkPaste()" style="margin-top:0; padding:10px 20px; font-size:1rem; background-color:var(--success); width:100%;">Apply List to Code 5</button>
        </div>
    </div>
    <div class="student-card" id="gameCard"></div>
</div>

<script>
    const MASTER_SPELLING_RULES = {
        "eigh_vowel_team": "🏫 <strong>Vowel Team 'eigh' Lesson (List 46a):</strong><br>The vowel team 'eigh' makes a single long /a/ sound (as in <em>gate</em>).<br><ul><li>Examples include: <em>eight, eighty, eighteen, sleigh, neigh, neighbour, weigh, weight</em>.</li></ul>",
        "ie_vowel_team_long_e": "🏫 <strong>Vowel Team 'ie' Long /e/ Lesson (List 46b):</strong><br>The spelling team 'ie' represents the <strong>long /e/ sound</strong> (as in <em>tree</em>).<br><ul><li>Rule: <em>'i before e, except after c'</em>. Examples: <em>chief, thief, field, piece, movie, brief, belief</em>.</li></ul>",
        "ough_variations": "🏫 <strong>Vowel Team 'ough' Structural Variations Lesson (List 46c):</strong><br>The spelling 'ough' can represent multiple distinct sounds:<br><ul><li><strong>Long /o/</strong>: <em>though, although, dough</em>.</li><li><strong>The /or/ sound</strong>: <em>bought, fought, thought, brought</em>.</li><li><strong>The /ou/ sound</strong>: <em>plough, bough, drought</em>.</li></ul>",
        "ue_vowel_team_long_u": "🏫 <strong>Vowel Team 'ue' Long /u/ Lesson (List 46d):</strong><br>The vowel team 'ue' systematically represents the <strong>long /u/ sound</strong> at the end of base syllables.<br><ul><li>Examples include: <em>cue, due, avenue, continue, duel, fuel, argue, value, rescue</em>.</li></ul>",
        "soft_c_soft_g": "🏫 <strong>Soft C and Soft G Constraints Lesson (List 47):</strong><br>Letters 'c' and 'g' modify their structural phonetic sounds depending completely on the following letter:<br><ul><li><strong>Soft C Rule:</strong> When followed by <strong>e, i, or y</strong>, it sounds like <strong>/s/</strong> (e.g., <em>city, cent, price, pencil</em>).</li><li><strong>Soft G Rule:</strong> When followed by <strong>e, i, or y</strong>, it sounds like <strong>/j/</strong> (e.g., <em>magic, gem, giant, gym, cage, danger</em>).</li></ul>",
        "three_spellings_air": "🏫 <strong>Three Spellings for the /air/ Sound Lesson (List 51):</strong><br>The identical phoneme <strong>/air/</strong> can be represented by three different spelling layouts:<br><ul><li><strong>'air' pattern:</strong> <em>chair, fair, pair, stair, repair</em>.</li><li><strong>'are' pattern:</strong> <em>dare, bare, square, rare, share, scare</em>.</li><li><strong>'ear' pattern:</strong> <em>bear, pear, tear</em>.</li></ul>",
        "y_suffix_rules": "🏫 <strong>The 'Y' Suffix Morphology Rule Lesson (List 52):</strong><br>When appending a suffix to a base word ending with 'y', inspect the letter right before that 'y':<br><ul><li><strong>Vowel + Y Rule:</strong> Keep the 'y' (e.g., <em>enjoyed, staying, delays</em>).</li><li><strong>Consonant + Y Rule:</strong> Change 'y' to 'i' (e.g., <em>studied, beautiful, buried, easiest</em>). *Exception: keep 'y' if suffix is <em>-ing</em>.</li></ul>",
        "administrative_suffixes": "🏫 <strong>Advanced Suffixes (-tion, -sion, -cian) Lesson (List 53):</strong><br>These three suffixes sound identical (/shuhn/), but their spellings reveal meaning:<br><ul><li><strong>-tion:</strong> Most common form; action or state of being (e.g., <em>celebration, pollution, action</em>).</li><li><strong>-sion:</strong> Typically replaces roots ending in 'd', 's', or 'mit' (e.g., <em>collision, division, extension, explosion</em>).</li><li><strong>-cian:</strong> Signals a professional person or skilled craftsperson (e.g., <em>musician, politician, magician, electrician</em>).</li></ul>",
        "unusual_spellings": "🏫 <strong>Unusual Silent Consonant Digraphs Lesson (List 54):</strong><br>English historical silent markers inside single structural syllables:<br><ul><li><strong>'wr' represents /r/:</strong> <em>wrong, write, wreath, wrote, wrist</em>.</li><li><strong>'kn' represents /n/:</strong> <em>knit, knot, know, knew, knee, knock</em>.</li><li><strong>'sc' represents /s/:</strong> <em>science, descend, fascinate, scent</em>.</li><li><strong>'mb' represents /m/:</strong> <em>lamb, limb, comb, bomb, thumb, climb</em>.</li></ul>",
        "schwa_unstressed_vowels": "🏫 <strong>The Unstressed Schwa Vowel Lesson (List 55):</strong><br>In an unstressed syllable, the vowel loses its clarity and transforms into a soft 'uh' sound.<br><ul><li>Examples include: <em>winter, summer, after, never, sister, rocket, quiet, silent, lemon, focus, problem</em>.</li></ul>",
        "plural_f_fe_changes": "🏫 <strong>Plural Alterations Ending in 'f' or 'fe' Lesson (List 56):</strong><br>Active rule: drop the final <strong>'f' or 'fe'</strong>, replace it with a <strong>'v'</strong>, and add <strong>'es'</strong>.<br><ul><li>Examples: <em>calf ➔ calves, loaf ➔ loaves, half ➔ halves, shelf ➔ shelves, thief ➔ thieves, life ➔ lives</em>.</li></ul>"
    };

    const formViewURL = "https://docs.google.com/forms/d/e/1FAIpQLSddB0NQFaIBv9x-feJucH_YGDwHb8suDI9h1ShPOv1yGzCCXQ/viewform";
    const nameKey = "entry.421008981"; const wordsKey = "entry.1429911539"; const incorrectKey = "entry.407995943"; const scoreKey = "entry.211442136";
    
    const storageKeyCurriculum = 'genericSavedCurriculum_Code5';
    const storageKeyCode = 'genericSavedCode_Code5';
    const MASTER_PANEL_PASSWORD = "admin"; 

    let masterRulesMap = {}; let activeLessonWords = []; let currentWordIndex = 0; let currentStep = 0; 
    let masterTeacherCode = "tiger"; let activeLessonLabel = ""; let studentName = "";
    let correctWordsList = []; let incorrectWordsList = []; let correctCount = 0;

    function secureTogglePanel() {
        const p = document.getElementById('teacherPanel');
        if (p.style.display === 'none' || p.style.display === '') {
            const check = prompt("Enter Master Teacher Password to unlock configuration:");
            if (check === MASTER_PANEL_PASSWORD) { 
                p.style.display = 'block'; 
            } else if (check !== null) { 
                alert("Incorrect teacher security credentials."); 
            }
        } else { 
            p.style.display = 'none'; 
        }
    }

    function processBulkPaste() {
        const rawText = document.getElementById('bulkPasteInput').value.trim();
        if(!rawText) return alert("Box is empty!");
        
        // Clean up formatting issues by breaking down lines carefully and eliminating hidden symbols
        const lines = rawText.split('\n').map(line => line.trim()).filter(line => line.length > 0);
        let tempMap = {};
        
        lines.forEach(line => {
            const parts = line.split(',');
            // Fix 2: Clean up words completely when loading, removing any stray control tokens (\r, hidden tabs)
            const word = parts[0] ? parts[0].trim().toLowerCase().replace(/[^a-zA-Z-]/g, "") : "";
            const ruleName = parts[1] ? parts[1].trim() : "General List";
            const sentence = parts.slice(2).join(',') ? parts.slice(2).join(',').trim() : "Fill in the blank: ___";
            
            if (word) { 
                if (!tempMap[ruleName]) tempMap[ruleName] = []; 
                tempMap[ruleName].push({ word, rule: ruleName, sentence }); 
            }
        });
        
        if (Object.keys(tempMap).length === 0) return alert("Invalid format layout lines.");
        
        masterRulesMap = tempMap;
        masterTeacherCode = document.getElementById('teacherCodeSetting').value.trim().toLowerCase().replace(/[^a-zA-Z0-9]/g, "");
        
        localStorage.setItem(storageKeyCurriculum, JSON.stringify(masterRulesMap));
        localStorage.setItem(storageKeyCode, masterTeacherCode);
        
        document.getElementById('bulkPasteInput').value = "";
        document.getElementById('teacherPanel').style.display = 'none'; // Closes clean, dropping layer block layout
        
        studentName = ""; currentStep = 0; renderStep();
        alert(`Code 5 updated successfully!`);
    }
    
    function getRequiredPassword() { 
        return currentWordIndex === 0 ? masterTeacherCode : activeLessonWords[currentWordIndex - 1].word; 
    }

    function findRuleExplanation(rawRuleName) {
        let cleaned = rawRuleName.toLowerCase().trim();
        for (let key in MASTER_SPELLING_RULES) {
            if (cleaned.startsWith(key)) { return MASTER_SPELLING_RULES[key]; }
        }
        return null;
    }

    function renderStep() {
        const card = document.getElementById('gameCard');
        if (Object.keys(masterRulesMap).length === 0) {
            card.innerHTML = `<h2>Code 5 Station</h2><p>Click <strong>Open Control Panel</strong> to paste your Code 5 list!</p>`;
            return;
        }
        if (currentStep === 0) {
            card.innerHTML = `<h2>Vocabulary Station</h2><p style="font-size: 1.2rem;">Enter your name:</p><input type="text" id="nameInput" class="student-input" placeholder="Your Name..."><br><button onclick="submitName()">Enter Station</button>`;
            document.getElementById('nameInput').focus();
        } else if (currentStep === 0.5) {
            let buttons = "";
            Object.keys(masterRulesMap).forEach((ruleName) => {
                // Displays actual custom list name on buttons
                buttons += `<button class="menu-btn" onclick="launchRule('${encodeURIComponent(ruleName)}')"><span style="display:block; margin-bottom: 8px;">${ruleName}</span><span style="font-size:0.85rem; font-weight:normal; color:#64748b;">(${masterRulesMap[ruleName].length} words)</span></button>`;
            });
            card.innerHTML = `<h2>Hello, ${studentName}!</h2><p style="font-size: 1.2rem; margin-bottom:10px;">Select your list:</p><div class="menu-grid">${buttons}</div>`;
        } else {
            const currentData = activeLessonWords[currentWordIndex];
            let progressHTML = `<div class="progress-bar">${activeLessonLabel} &bull; Word ${currentWordIndex + 1} of ${activeLessonWords.length}</div>`;
            let ruleExplanation = findRuleExplanation(currentData.rule) || `💡 <strong>Pattern Rule:</strong> Focus on spelling words in the <em>${currentData.rule}</em> category carefully!`;

            if (currentStep === 1) {
                card.innerHTML = `${progressHTML}<div class="target-word">${currentData.word}</div><div class="rule-box">${ruleExplanation}</div><button onclick="nextStep()">I Studied It</button>`;
            } else if (currentStep === 2) {
                let hint = currentWordIndex === 0 ? `The starting lock word is: <strong>${masterTeacherCode}</strong>` : "Type the previous word you just spelled to unlock your notebook work!";
                card.innerHTML = `${progressHTML}<div style="font-size: 1.4rem; font-weight: bold; color: var(--danger);">Notebook Practice</div><ol style="text-align: left; margin: 20px auto; max-width: 85%; font-size: 1.2rem; line-height: 1.6;"><li>Look closely at the word: <strong>${currentData.word}</strong></li><li>Write it down on paper 5 times.</li></ol><div class="lock-container"><label style="font-weight: bold; display:block; margin-bottom:5px;">Password Lock</label><span style="font-size:0.9rem; color:#64748b; display:block; margin-bottom:10px;">${hint}</span><input type="text" id="passInput" class="teacher-password-input" placeholder="Password..." autocomplete="off" autocapitalize="none"><br><button onclick="verifyTeacherCode()" style="margin-top:10px; padding: 8px 20px; background-color: var(--danger);">Unlock</button><div id="lockFeedback" class="feedback"></div></div>`;
                document.getElementById('passInput').focus();
            } else if (currentStep === 3) {
                card.innerHTML = `${progressHTML}<p style="font-size:1.3rem;">Study before it disappears...</p><div class="target-word" id="fadingWord">${currentData.word}</div>`;
                setTimeout(() => { document.getElementById('fadingWord')?.classList.add('hidden-word'); setTimeout(() => { nextStep(); }, 800); }, 1800);
            } else if (currentStep === 4) {
                card.innerHTML = `${progressHTML}<div class="sentence-prompt">${currentData.sentence}</div><input type="text" id="testInput" class="student-input" placeholder="Spell here" autocomplete="off" autocapitalize="none"><br><button onclick="checkTestAnswer()">Verify Spelling</button><div id="testFeedback" class="feedback"></div>`;
                document.getElementById('testInput').focus();
            }
        }
    }

    function submitName() { const val = document.getElementById('nameInput').value.trim(); if(val) { studentName = val; currentStep = 0.5; renderStep(); } }
    function launchRule(encoded) { activeLessonWords = masterRulesMap[decodeURIComponent(encoded)]; activeLessonLabel = decodeURIComponent(encoded); currentWordIndex = 0; correctWordsList = []; incorrectWordsList = []; correctCount = 0; currentStep = 1; renderStep(); }
    function nextStep() { currentStep++; renderStep(); }
    
    function verifyTeacherCode() { 
        // Force inputs checked to clean lower case string structures to strip auto-caps failures
        const rawInput = document.getElementById('passInput').value.trim().toLowerCase().replace(/[^a-zA-Z0-9]/g, "");
        if(rawInput === getRequiredPassword()) { nextStep(); } 
        else { const fb = document.getElementById('lockFeedback'); fb.className = "feedback error"; fb.innerHTML = "Incorrect password lock."; } 
    }
    
    function checkTestAnswer() {
        // Advanced sanitization on spelling test verification
        const entered = document.getElementById('testInput').value.trim().toLowerCase().replace(/[^a-zA-Z-]/g, "");
        const correct = activeLessonWords[currentWordIndex].word;
        
        if(entered === correct) { 
            correctCount++; 
            correctWordsList.push(correct); 
        } else { 
            incorrectWordsList.push(`${entered || '[Blank]'} (${correct})`); 
        }
        
        const fb = document.getElementById('testFeedback');
        fb.className = entered === correct ? "feedback success" : "feedback error";
        fb.innerHTML = entered === correct ? "Correct!" : `Incorrect. Spelling is "${correct}".`;
        
        setTimeout(() => { 
            if (currentWordIndex < activeLessonWords.length - 1) { 
                currentWordIndex++; 
                currentStep = 1; 
                renderStep(); 
            } else { 
                showEndScreen(); 
            } 
        }, 2200);
    }

    function showEndScreen() {
        let finalScore = `${correctCount} out of ${activeLessonWords.length}`;
        document.getElementById('gameCard').innerHTML = `<h1 style="color: var(--success);">Practice Complete</h1><p>Great job, ${studentName}!</p><p>Score: <strong>${finalScore}</strong></p><div id="submissionZone"><button onclick="openGoogleFormLink()">Send Progress Form</button></div>`;
    }

    function openGoogleFormLink() {
        let finalScore = `${correctCount} out of ${activeLessonWords.length}`;
        let filledURL = `${formViewURL}?usp=pp_url&${nameKey}=${encodeURIComponent(studentName)}&${wordsKey}=${encodeURIComponent(correctWordsList.join(', ') || "None")}&${incorrectKey}=${encodeURIComponent(incorrectWordsList.join(', ') || "None")}&${scoreKey}=${encodeURIComponent(finalScore)}`;
        window.open(filledURL, '_blank');
        document.getElementById('submissionZone').innerHTML = `<p style="color: var(--success); font-weight:bold;">Form opened! Click submit on that page to finish.</p>`;
    }

    function init() {
        const savedCurriculum = localStorage.getItem(storageKeyCurriculum);
        const savedCode = localStorage.getItem(storageKeyCode);
        if (savedCurriculum) masterRulesMap = JSON.parse(savedCurriculum);
        if (savedCode) masterTeacherCode = savedCode;
    }
    init(); renderStep();
</script>
</body>
</html>
